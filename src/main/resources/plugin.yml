name: GitCraft
version: '${version}'
main: com.gitcraft.GitCraft
api-version: '1.21'
author: marcus
description: Git-like version control for Minecraft builds.
depend: [WorldEdit]
commands:
  gitcraft:
    description: GitCraft root command.
    aliases: [gc]
    usage: /gitcraft <init <name>|open <name>|pos1|pos2|clear|commit <msg>|log <region> [page]|reset <id> [--hard]|branch <name>|checkout <branch>|merge <branch>|cherry-pick <commit-id>|stash [pop|list]|push [remote-name] [--force]>
    permission: gitcraft.use
permissions:
  gitcraft.use:
    description: Use GitCraft commands.
    default: op
  gitcraft.log:
    description: View commit history for a region.
    default: op
  gitcraft.reset:
    description: Reset a region to a prior commit (paste only, history intact).
    default: op
  gitcraft.reset.hard:
    description: Hard-reset a region (paste + permanently delete all later commits).
    default: op
  gitcraft.branch:
    description: Create a new branch from the current HEAD commit.
    default: op
  gitcraft.checkout:
    description: Switch to an existing branch and restore its latest commit.
    default: op
  gitcraft.diff:
    description: Visualize block differences between two commits as ghost blocks.
    default: op
  gitcraft.merge:
    description: Merge another branch into the current branch with three-way conflict resolution.
    default: op
  gitcraft.cherrypick:
    description: Apply the changes introduced by a single commit onto the current branch.
    default: op
  gitcraft.stash:
    description: Save and restore selection state per repo (push/pop/list).
    default: op
  gitcraft.push.force:
    description: Force-push a GitCraft branch and overwrite remote history.
    default: op
