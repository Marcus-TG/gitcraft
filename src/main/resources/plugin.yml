name: GitCraft
version: '${version}'
main: com.gitcraft.GitCraft
api-version: '1.21'
author: marcus
description: Git-like version control for Minecraft builds.
depend: [WorldEdit]
commands:
  gitcraft:
    description: GitCraft root command.
    usage: /gitcraft <init <name>|open <name>|pos1|pos2|clear|commit <msg>|log <region> [page]|reset <id> [--hard]|branch <name>|checkout <branch>>
    permission: gitcraft.use
permissions:
  gitcraft.use:
    description: Use GitCraft commands.
    default: op
  gitcraft.log:
    description: View commit history for a region.
    default: op
  gitcraft.reset:
    description: Reset a region to a prior commit (paste only, history intact).
    default: op
  gitcraft.reset.hard:
    description: Hard-reset a region (paste + permanently delete all later commits).
    default: op
  gitcraft.branch:
    description: Create a new branch from the current HEAD commit.
    default: op
  gitcraft.checkout:
    description: Switch to an existing branch and restore its latest commit.
    default: op
